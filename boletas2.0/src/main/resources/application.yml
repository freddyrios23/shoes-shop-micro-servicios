server:
  port: 8082

spring:
  application:
    name: boletas2.0

  datasource:
    url: jdbc:mysql://localhost:3306/db_shoes_shop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
