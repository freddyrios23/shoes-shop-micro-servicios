server:
    port: 8081

spring:
    application:
        name: zapatillas

    datasource:
        url: jdbc:mysql://localhost:3306/shoes_shop?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        username: root
        password: ''
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        show-sql: true
        hibernate:
            ddl-auto: update
            naming:
                physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

    flyway:
        enabled: true
        baseline-on-migrate: true

    eureka:
        client:
            service-url:
            defaultZone: http://localhost:8761/eureka/

springdoc:
    api-docs:
        path: /zapatillas/api-docs
    swagger-ui:
        path: /doc/swagger-ui/index.html
    enable-hateoas: false